version: '3.8'

services:
  ai-server:
    build: .
    container_name: ai-server
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    networks:
      - default
      - backend_internal
    environment:
      DB_HOST: gao-mysql
      DB_PORT: 3306
      DB_NAME: mydb
      DB_USER: user
      DB_PASSWORD: 1234
      STUDENT_SOURCE_TABLE: users
      STUDENT_SOURCE_ORDER_BY: id
      ANALYSIS_RESULT_TABLE: student_analysis_results
      MATCHING_RESULT_TABLE: team_matching_results
      UPSTAGE_API_KEY: ${UPSTAGE_API_KEY}
      UPSTAGE_API_BASE: https://api.upstage.ai/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT}

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: mydb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

networks:
  backend_internal:
    external: true
