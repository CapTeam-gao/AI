version: '3.8'

services:
  ai-server:
    build: .
    container_name: gao-ai-server
    cpus: "${AI_SERVER_CPUS:-1.5}"
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: mydb
      DB_USER: root
      DB_PASSWORD: 1234
      STUDENT_SOURCE_TABLE: students
      STUDENT_SOURCE_ORDER_BY: id
      ANALYSIS_RESULT_TABLE: student_analysis_results
      MATCHING_RESULT_TABLE: team_matching_results
      UPSTAGE_API_KEY: ${UPSTAGE_API_KEY}
      OPENAI_API_KEY: ${UPSTAGE_API_KEY}
      UPSTAGE_API_BASE: https://api.upstage.ai/v1

  mysql:
    image: mysql:8.0
    container_name: gao-ai-mysql
    restart: always
    cpus: "${AI_MYSQL_CPUS:-0.5}"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: mydb
    ports:
      - "4000:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
