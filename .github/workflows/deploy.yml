name: Deploy AI Server

on:
  push:
    branches:
      - jinuk
      - master
  workflow_dispatch:

concurrency:
  group: deploy-ai-server
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AI_IMAGE: ghcr.io/capteam-gao/ai:${{ github.sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push AI image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.AI_IMAGE }}
            ghcr.io/capteam-gao/ai:latest

      - name: Validate SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null

      - name: Upload source to EC2
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
        run: |
          set -euo pipefail

          SSH_OPTIONS=(
            -i ~/.ssh/deploy_key
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=20
            -o ConnectionAttempts=3
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=20
            -p "${EC2_PORT:-22}"
          )
          SCP_OPTIONS=(
            -i ~/.ssh/deploy_key
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=20
            -o ConnectionAttempts=3
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=20
            -P "${EC2_PORT:-22}"
          )
          retry() {
            local attempt
            for attempt in 1 2 3; do
              "$@" && return 0
              sleep $((attempt * 10))
            done
            "$@"
          }

          APP_DIR="${EC2_DEPLOY_PATH:-/home/${EC2_USER}/apps/gaoAi}"
          APP_PARENT="$(dirname "$APP_DIR")"
          RELEASE_DIR="${APP_PARENT}/gaoAi.release"
          RELEASE_ARCHIVE="${APP_PARENT}/gaoAi.release.tgz"
          LOCAL_RELEASE_ARCHIVE="${RUNNER_TEMP}/gao-ai-release.tgz"

          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='.env' \
            --exclude='__pycache__' \
            -czf "$LOCAL_RELEASE_ARCHIVE" .

          retry ssh "${SSH_OPTIONS[@]}" "$EC2_USER@$EC2_HOST" "rm -rf '$RELEASE_DIR' && mkdir -p '$RELEASE_DIR'"
          retry scp "${SCP_OPTIONS[@]}" "$LOCAL_RELEASE_ARCHIVE" "$EC2_USER@$EC2_HOST:$RELEASE_ARCHIVE"
          retry ssh "${SSH_OPTIONS[@]}" "$EC2_USER@$EC2_HOST" "tar -xzf '$RELEASE_ARCHIVE' -C '$RELEASE_DIR' && rm -f '$RELEASE_ARCHIVE' && rm -rf '$APP_DIR' && mv '$RELEASE_DIR' '$APP_DIR'"

      - name: Deploy on EC2
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
        run: |
          set -euo pipefail

          SSH_OPTIONS=(
            -i ~/.ssh/deploy_key
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=20
            -o ConnectionAttempts=3
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=20
            -p "${EC2_PORT:-22}"
          )
          APP_DIR="${EC2_DEPLOY_PATH:-/home/${EC2_USER}/apps/gaoAi}"

          ssh \
            "${SSH_OPTIONS[@]}" \
            "$EC2_USER@$EC2_HOST" \
            "APP_DIR='$APP_DIR' bash -s" \
            <<'REMOTE_SCRIPT'
          set -eu

          cd "$APP_DIR"

          cat > .env <<'EOF'
          UPSTAGE_API_KEY=${{ secrets.UPSTAGE_API_KEY }}
          AI_IMAGE=${{ env.AI_IMAGE }}
          EOF

          chmod 600 .env
          printf '%s\n' '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
          docker compose config
          docker compose pull ai-server
          docker rm -f gao-ai-server gao-ai-mysql 2>/dev/null || true
          docker compose up -d --remove-orphans
          docker compose ps
          REMOTE_SCRIPT
