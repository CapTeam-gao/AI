name: Deploy AI Server

on:
  push:
    branches:
      - main
      - jinuk
  workflow_dispatch:

concurrency:
  group: deploy-ai-server
  cancel-in-progress: true

jobs:
  docker-build-check:
    name: Docker build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gao-ai-server:ci .

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build-check

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
      EC2_USERNAME: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH || '/home/ec2-user/AI' }}
      UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_PORT"
          test -n "$EC2_USERNAME"
          test -n "$EC2_SSH_KEY"
          test -n "$UPSTAGE_API_KEY"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$EC2_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Sync project files to EC2
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USERNAME@$EC2_HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -az \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.idea' \
            -e "ssh -i ~/.ssh/ec2_key -p $EC2_PORT" \
            ./ "$EC2_USERNAME@$EC2_HOST:$DEPLOY_PATH/"

      - name: Write production environment file
        run: |
          printf 'UPSTAGE_API_KEY=%s\n' "$UPSTAGE_API_KEY" |
            ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USERNAME@$EC2_HOST" "cat > '$DEPLOY_PATH/.env'"

      - name: Restart Docker Compose services
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USERNAME@$EC2_HOST" "
            cd '$DEPLOY_PATH' &&
            docker compose up -d --build &&
            docker image prune -f
          "
